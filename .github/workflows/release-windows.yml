name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Write private license config
        shell: pwsh
        env:
          LICENSE_CONFIG_JSON: ${{ secrets.LICENSE_CONFIG_JSON }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:LICENSE_CONFIG_JSON)) {
            Set-Content -Path .\license.json -Value $env:LICENSE_CONFIG_JSON -Encoding UTF8
          }

      - name: Build Windows package
        shell: pwsh
        run: .\win\build-windows.ps1 -Runtime win-x64

      - name: Zip Windows package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\dist\release | Out-Null
          Compress-Archive -Path ".\dist\win\Codex History Viewer\*" -DestinationPath ".\dist\release\Codex-History-Viewer-win-x64.zip" -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/Codex-History-Viewer-win-x64.zip
          generate_release_notes: true
