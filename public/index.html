<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex History Viewer</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section id="licenseGate" class="license-gate" hidden>
        <div class="license-card">
          <div class="license-kicker">Private App</div>
          <h1>激活 Codex History Viewer</h1>
          <p id="licenseMessage">这个版本需要激活后使用。一个激活码最多可绑定 2 台机器。</p>
          <form id="licenseForm" class="license-form">
            <label>
              <span>激活码</span>
              <input id="licenseKey" type="text" inputmode="latin" autocomplete="off" placeholder="CHV-XXXX-XXXX-XXXX-XXXX" required>
            </label>
            <button id="activateLicense" type="submit">激活</button>
          </form>
          <div id="licenseStatus" class="license-status"></div>
        </div>
      </section>

      <section id="appShell" class="app-shell" hidden>
      <header class="topbar">
        <div>
          <h1>Codex History</h1>
          <p id="dbPath">Loading...</p>
          <div id="licenseInline" class="license-inline" hidden>
            <span id="licenseInlineText"></span>
            <button id="deactivateLicense" type="button">解绑本机</button>
          </div>
        </div>
        <div class="summary" id="summary"></div>
      </header>

      <section class="filters" aria-label="历史筛选">
        <label class="search">
          <span>搜索</span>
          <input id="query" type="search" placeholder="标题、首条消息、项目路径、会话 ID">
        </label>
        <label>
          <span>项目</span>
          <select id="project"></select>
        </label>
        <label>
          <span>Provider</span>
          <select id="provider"></select>
        </label>
        <label>
          <span>状态</span>
          <select id="archived">
            <option value="0">未归档</option>
            <option value="all">全部</option>
            <option value="1">已归档</option>
          </select>
        </label>
      </section>

      <section class="provider-sync" aria-label="Provider 同步">
        <div class="provider-sync-main">
          <div class="panel-title">Provider Sync</div>
          <div id="providerSyncSummary" class="provider-sync-summary">Loading...</div>
          <div id="providerSyncDetail" class="provider-sync-detail"></div>
          <div id="providerSyncWarning" class="provider-sync-warning" hidden></div>
          <div id="providerSyncStatus" class="provider-sync-status"></div>
        </div>
        <div class="provider-sync-actions">
          <button id="refreshProviderSync" type="button">刷新</button>
          <button id="fixProviderConfig" type="button" hidden>修复配置名</button>
          <button id="syncProvider" type="button">同步 Provider</button>
        </div>
      </section>

      <section class="content">
        <aside class="projects">
          <div class="panel-title">项目</div>
          <div id="projectList" class="project-list"></div>
        </aside>
        <section class="threads">
          <div class="toolbar">
          <div>
            <div id="resultInfo"></div>
            <div id="promoteStatus" class="promote-status"></div>
          </div>
          <div class="toolbar-actions">
            <button id="promoteProject" type="button">恢复到 Codex App</button>
            <button id="loadMore" type="button">加载更多</button>
          </div>
          </div>
          <div id="threads"></div>
        </section>
      </section>
      </section>
    </main>
    <script src="./app.js" type="module"></script>
  </body>
</html>
